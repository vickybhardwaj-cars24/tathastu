<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Outfit:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold-lt:#E8CC80;--gold-dk:#8B6914;
  --ink:#0A0A0A;--s1:#141414;--s2:#1E1E1E;--s3:#272727;
  --br:#2A2A2A;--tx:#F0EAD8;--txm:#7A7060;
  --red:#E07070;--red-bg:rgba(224,112,112,.1);--red-br:rgba(224,112,112,.25);
  --grn:#5CC87A;--grn-bg:rgba(92,200,122,.1);--grn-br:rgba(92,200,122,.25);
  --amb:#F0A840;--amb-bg:rgba(240,168,64,.1);--amb-br:rgba(240,168,64,.25);
  --blu:#60A8E0;--blu-bg:rgba(96,168,224,.1);--blu-br:rgba(96,168,224,.25);
  --r:8px;
}
body{background:var(--ink);color:var(--tx);font-family:'Outfit',sans-serif;font-size:13px;min-height:100vh;overflow-x:hidden}
.hdr{display:flex;align-items:center;gap:16px;padding:14px 20px;border-bottom:1px solid var(--br);background:var(--s1)}
.logo-ring{width:54px;height:54px;border-radius:50%;border:2px solid var(--gold);background:var(--s2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-ring svg{width:44px;height:44px}
.studio{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--gold);line-height:1}
.studio-sub{font-size:10px;color:var(--txm);letter-spacing:.14em;text-transform:uppercase;margin-top:3px}
.hdr-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.date-chip{background:var(--s2);border:1px solid var(--br);padding:5px 12px;border-radius:var(--r);font-size:11px;color:var(--txm)}
.date-chip b{color:var(--gold)}

/* NAV */
.nav{display:flex;background:var(--s1);border-bottom:1px solid var(--br);padding:0 20px;gap:2px;overflow-x:auto}
.nav::-webkit-scrollbar{height:0}
.ntab{padding:11px 14px;font-size:12px;color:var(--txm);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;white-space:nowrap;transition:all .18s;font-family:'Outfit',sans-serif}
.ntab:hover{color:var(--tx)}
.ntab.on{color:var(--gold);border-bottom-color:var(--gold)}

/* MAIN */
.pg{padding:18px 20px;min-height:400px}
.hidden{display:none!important}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;margin-bottom:16px}
.sc{background:var(--s2);border:1px solid var(--br);border-radius:var(--r);padding:12px;position:relative;overflow:hidden}
.sc::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold);opacity:.5}
.sc-lbl{font-size:10px;color:var(--txm);letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px}
.sc-val{font-size:20px;font-weight:600;font-family:'Cormorant Garamond',serif;color:var(--tx)}
.sc-val.g{color:var(--gold)}
.sc-val.r{color:var(--red)}
.sc-val.gr{color:var(--grn)}

/* SECTION HDR */
.shdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.stitle{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--gold-lt)}
.ssub{font-size:11px;color:var(--txm);margin-top:1px}

/* BUTTONS */
.btn{padding:7px 16px;border-radius:var(--r);border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;transition:all .15s}
.btn-g{background:var(--gold);color:#180F00}
.btn-g:hover{background:var(--gold-lt)}
.btn-o{background:transparent;border:1px solid var(--br);color:var(--txm)}
.btn-o:hover{border-color:var(--gold);color:var(--gold)}
.btn-d{background:transparent;border:1px solid var(--red-br);color:var(--red)}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:5px}
.btn-wa{background:rgba(37,211,102,.15);border:1px solid rgba(37,211,102,.3);color:#25D366;font-size:11px;padding:4px 10px;border-radius:5px;cursor:pointer;font-family:'Outfit',sans-serif}
.btn-row{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}

/* TABLE */
.tw{background:var(--s1);border:1px solid var(--br);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.tw table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.tw th{background:var(--s2);color:var(--txm);font-weight:500;padding:9px 10px;text-align:left;font-size:10px;letter-spacing:.07em;text-transform:uppercase;border-bottom:1px solid var(--br)}
.tw td{padding:9px 10px;border-bottom:1px solid var(--br);color:var(--tx);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tw tr:last-child td{border-bottom:none}
.tw tr:hover td{background:var(--s2)}

/* BADGES */
.bdg{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;letter-spacing:.04em;white-space:nowrap}
.bdg-g{background:var(--gold-dk);color:var(--gold-lt);border:1px solid rgba(201,168,76,.3)}
.bdg-grn{background:var(--grn-bg);color:var(--grn);border:1px solid var(--grn-br)}
.bdg-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-br)}
.bdg-amb{background:var(--amb-bg);color:var(--amb);border:1px solid var(--amb-br)}
.bdg-blu{background:var(--blu-bg);color:var(--blu);border:1px solid var(--blu-br)}
.bdg-muted{background:var(--s2);color:var(--txm);border:1px solid var(--br)}
.bdg-urg{background:rgba(224,112,112,.2);color:#FF9090;border:1px solid var(--red-br);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* FORMS */
.fc{background:var(--s1);border:1px solid var(--br);border-radius:var(--r);padding:16px;margin-bottom:12px}
.ftitle{font-size:11px;font-weight:500;color:var(--gold);margin-bottom:12px;text-transform:uppercase;letter-spacing:.08em}
.fg{display:grid;gap:8px}
.fg-2{grid-template-columns:repeat(2,1fr)}
.fg-3{grid-template-columns:repeat(3,1fr)}
.fg-4{grid-template-columns:repeat(4,1fr)}
.fg-5{grid-template-columns:repeat(5,1fr)}
.ff{display:flex;flex-direction:column;gap:3px}
.ff label{font-size:10px;color:var(--txm);text-transform:uppercase;letter-spacing:.07em}
.ff input,.ff select,.ff textarea{background:var(--s2);border:1px solid var(--br);border-radius:6px;color:var(--tx);font-family:'Outfit',sans-serif;font-size:12px;padding:7px 9px;width:100%;outline:none;transition:border-color .18s}
.ff input:focus,.ff select:focus,.ff textarea:focus{border-color:var(--gold)}
.ff select option{background:var(--s2)}
.ff textarea{resize:vertical;min-height:50px}
.ff input[readonly]{opacity:.6}

/* CREW GRID */
.crew-g{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-top:8px}
.ci{background:var(--s2);border:1px solid var(--br);border-radius:6px;padding:7px 4px;display:flex;flex-direction:column;align-items:center;gap:3px}
.ci label{font-size:9px;color:var(--txm);text-align:center;letter-spacing:.03em;line-height:1.2}
.ci input{background:var(--s3);border:1px solid var(--br);border-radius:4px;color:var(--tx);font-size:13px;font-weight:600;text-align:center;width:44px;padding:3px;outline:none}
.ci input:focus{border-color:var(--gold)}

/* PRICE CARD */
.price-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:12px}
.pcard{background:var(--s2);border:1px solid var(--br);border-radius:var(--r);padding:12px}
.pcard-name{font-size:12px;font-weight:500;color:var(--tx);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcard-row{display:flex;justify-content:space-between;font-size:11px;margin-top:3px}
.pcard-lbl{color:var(--txm)}
.pcard-val{font-weight:500;color:var(--tx)}
.pcard-profit{color:var(--grn);font-weight:600}
.pcard-warn{color:var(--amb)}

/* TASK CARD */
.task-list{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.tk{background:var(--s1);border:1px solid var(--br);border-radius:var(--r);padding:10px 12px;display:flex;align-items:center;gap:10px}
.tk.urg{border-left:3px solid var(--red)}
.tk.hi{border-left:3px solid var(--amb)}
.tk.norm{border-left:3px solid var(--blu)}
.tk-info{flex:1;min-width:0}
.tk-name{font-size:12px;font-weight:500;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tk-meta{font-size:10px;color:var(--txm);margin-top:2px}
.tk-right{display:flex;gap:6px;align-items:center;flex-shrink:0}

/* SEARCH */
.srow{display:flex;gap:8px;margin-bottom:12px}
.sinp{background:var(--s1);border:1px solid var(--br);border-radius:var(--r);color:var(--tx);font-family:'Outfit',sans-serif;font-size:12px;padding:8px 12px;flex:1;outline:none}
.sinp:focus{border-color:var(--gold)}
.fsel{background:var(--s1);border:1px solid var(--br);border-radius:var(--r);color:var(--txm);font-family:'Outfit',sans-serif;font-size:12px;padding:8px 10px;outline:none}

/* REPORT */
.rep-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-bottom:16px}
.rep-card{background:var(--s2);border:1px solid var(--br);border-radius:var(--r);padding:14px}
.rep-title{font-size:11px;color:var(--txm);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.rep-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--br);font-size:12px}
.rep-row:last-child{border-bottom:none}
.rep-lbl{color:var(--txm)}
.rep-val{font-weight:500;color:var(--tx)}

/* MODAL SHADE */
.shade{background:rgba(0,0,0,.85);display:flex;align-items:flex-start;justify-content:center;padding:20px}
.modal{background:var(--s1);border:1px solid var(--br);border-radius:12px;padding:20px;width:100%;max-width:640px}
.mtitle{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--gold);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.mclose{background:transparent;border:none;color:var(--txm);cursor:pointer;font-size:16px;font-family:'Outfit',sans-serif}
.divider{border:none;border-top:1px solid var(--br);margin:12px 0}
.csub{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:.1em;margin:10px 0 6px}

/* QUICK LOG */
.ql{background:var(--s2);border:1px solid var(--gold-dk);border-radius:var(--r);padding:14px;margin-bottom:16px}
.ql-title{font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}

.empty{text-align:center;padding:36px;color:var(--txm);font-size:12px}
.phone{font-size:10px;color:var(--txm);margin-top:1px}
.amt{color:var(--gold-lt);font-weight:500}
.bal-r{color:var(--red)}
.bal-g{color:var(--grn)}
.mt8{margin-top:8px}

/* LOGIN MODAL */
#login-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:999;display:flex;align-items:center;justify-content:center}
#login-overlay.hidden{display:none}
.login-box{background:var(--s1);border:1px solid var(--br);border-radius:14px;padding:32px 28px;width:320px;text-align:center}
.login-logo{width:64px;height:64px;border-radius:50%;border:2px solid var(--gold);background:var(--s2);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.login-logo svg{width:52px;height:52px}
.login-title{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold);margin-bottom:4px}
.login-sub{font-size:11px;color:var(--txm);margin-bottom:20px;letter-spacing:.06em}
.login-field{background:var(--s2);border:1px solid var(--br);border-radius:8px;color:var(--tx);font-family:'Outfit',sans-serif;font-size:13px;padding:10px 12px;width:100%;outline:none;margin-bottom:10px;transition:border-color .18s}
.login-field:focus{border-color:var(--gold)}
.login-btn{background:var(--gold);color:#180F00;border:none;border-radius:8px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;padding:11px;width:100%;cursor:pointer;margin-top:4px;transition:background .15s}
.login-btn:hover{background:var(--gold-lt)}
.login-err{font-size:11px;color:var(--red);margin-top:8px;min-height:16px}

/* SYNC STATUS */
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px}
.sync-dot.ok{background:var(--grn)}
.sync-dot.saving{background:var(--amb);animation:pulse 1s infinite}
.sync-dot.err{background:var(--red)}
#sync-status{font-size:10px;color:var(--txm);display:flex;align-items:center}
</style>

<script>
const WALKIN_SVC=['Passport Photos','ID Photos','Baby Shoot','Birthday Shoot','Couple Shoot','Portrait','Product Photography','School Photos','Resume Photos','Photo Frame','Photo Printing','DVD Recovery','Data Recovery','Lamination','Other'];
const BIG_SVC=['Wedding','Pre Wedding','Maternity Shoot','Event','Jagran','Chowki','Sagai','Ring Ceremony','Portfolio','Family Shoot','Documentary','Movie','Janeu'];
const ORDER_STATUS=['New Order','In Progress','Urgent','Ready','Delivered','Payment Pending','Cancelled'];
const TASK_PRI=['Urgent','High','Normal','Low'];
const PAY_MODES=['Cash','UPI','Card','Bank Transfer'];
const FRAME_SIZES=['4x6','5x7','6x8','8x10','8x12','10x12','10x14','12x15','12x16','12x18','16x20','16x24','20x24','20x30','24x30','24x36'];

let DB={
  walkins:   [],
  events:    [],
  tasks:     [],
  pricing:   FRAME_SIZES.map(s=>({size:s,cost:0,sell:0,note:''})),
  customers: [],
};

/* ── Auth helpers ── */
function getCredentials(){
  const u=sessionStorage.getItem('tw_u')||'';
  const p=sessionStorage.getItem('tw_p')||'';
  return u&&p ? 'Basic '+btoa(u+':'+p) : null;
}

function workerBase(){
  let u = (typeof WORKER_URL === 'string' ? WORKER_URL : '').trim();
  if(!u) return '';
  if(!u.startsWith('http')) u = 'https://' + u;
  return u.replace(/\/$/, ''); // strip trailing slash
}
function workerAvailable(){ return workerBase() !== ''; }

/* ── Sync status UI ── */
function setSyncStatus(state){
  const dot=document.getElementById('sync-dot');
  const txt=document.getElementById('sync-txt');
  if(!dot||!txt) return;
  dot.className='sync-dot '+state;
  txt.textContent=state==='ok'?'Synced':state==='saving'?'Saving…':'Sync error';
}

/* ── Save: localStorage cache + R2 via Worker ── */
let _saveTimer=null;
function save(){
  // Always write to localStorage as offline cache
  localStorage.setItem('tw_db', JSON.stringify(DB));

  // Debounce R2 writes (300 ms) to avoid hammering on rapid edits
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(async()=>{
    if(!workerAvailable()) return;
    const creds=getCredentials();
    if(!creds) return;
    setSyncStatus('saving');
    try{
      const res=await fetch(workerBase()+'/data',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':creds},
        body:JSON.stringify(DB),
      });
      setSyncStatus(res.ok?'ok':'err');
    }catch{
      setSyncStatus('err');
    }
  },300);
}

/* ── Login / Logout ── */
async function doLogin(){
  const u=(document.getElementById('li-user').value||'').trim();
  const p=document.getElementById('li-pass').value||'';
  const err=document.getElementById('li-err');
  if(!u||!p){err.textContent='Enter username and password';return;}

  if(!workerAvailable()){
    err.textContent='WORKER_URL not set in index.html';return;
  }

  err.textContent='Signing in…';
  try{
    const res=await fetch(workerBase()+'/verify',{
      method:'POST',
      headers:{'Authorization':'Basic '+btoa(u+':'+p)},
    });
    if(!res.ok){err.textContent='Wrong username or password';return;}

    sessionStorage.setItem('tw_u',u);
    sessionStorage.setItem('tw_p',p);
    document.getElementById('login-overlay').classList.add('hidden');
    err.textContent='';
    await loadFromWorker();
  }catch(e){
    err.textContent='Cannot reach server. Check WORKER_URL.';
  }
}

function doLogout(){
  sessionStorage.removeItem('tw_u');
  sessionStorage.removeItem('tw_p');
  document.getElementById('login-overlay').classList.remove('hidden');
  document.getElementById('li-pass').value='';
  document.getElementById('li-err').textContent='';
}

/* ── Load DB from R2 on login ── */
async function loadFromWorker(){
  if(!workerAvailable()) return loadFromCache();
  const creds=getCredentials();
  if(!creds) return loadFromCache();
  try{
    const res=await fetch(workerBase()+'/data',{
      headers:{'Authorization':creds},
    });
    if(!res.ok) return loadFromCache();
    const data=await res.json();
    DB.walkins   = data.walkins   || [];
    DB.events    = data.events    || [];
    DB.tasks     = data.tasks     || [];
    DB.pricing   = data.pricing   || FRAME_SIZES.map(s=>({size:s,cost:0,sell:0,note:''}));
    DB.customers = data.customers || [];
    localStorage.setItem('tw_db', JSON.stringify(DB)); // update local cache
    setSyncStatus('ok');
    render();
  }catch{
    loadFromCache();
  }
}

function loadFromCache(){
  const cached=localStorage.getItem('tw_db');
  if(cached){
    try{
      const d=JSON.parse(cached);
      DB.walkins   = d.walkins   || [];
      DB.events    = d.events    || [];
      DB.tasks     = d.tasks     || [];
      DB.pricing   = d.pricing   || FRAME_SIZES.map(s=>({size:s,cost:0,sell:0,note:''}));
      DB.customers = d.customers || [];
    }catch{}
  }
  setSyncStatus('err');
  render();
}

function today(){return new Date().toISOString().split('T')[0];}
function fmtINR(n){return '₹'+(Math.round(parseFloat(n)||0)).toLocaleString('en-IN');}
function daysFrom(d){if(!d)return null;const diff=Math.ceil((new Date(d)-new Date(today()))/86400000);return diff;}

let curTab='dash';
function go(id,btn){
  curTab=id;
  document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function render(){
  const pg=document.getElementById('pg');
  if(curTab==='dash') pg.innerHTML=renderDash();
  else if(curTab==='walkins') pg.innerHTML=renderWalkins();
  else if(curTab==='events') pg.innerHTML=renderEvents();
  else if(curTab==='tasks') pg.innerHTML=renderTasks();
  else if(curTab==='pricing') pg.innerHTML=renderPricing();
  else if(curTab==='customers') pg.innerHTML=renderCustomers();
  else if(curTab==='pending') pg.innerHTML=renderPending();
  else if(curTab==='delivery') pg.innerHTML=renderDelivery();
  else if(curTab==='reports') pg.innerHTML=renderReports();
  else if(curTab==='quicklog') pg.innerHTML=renderQuickLog();
  attachEvents();
}

/* ─── DELIVERY ─── */
function renderDelivery(){
  const n=new Date();n.setHours(0,0,0,0);
  const all=[...DB.walkins.map(o=>({...o,_t:'Walk-in'})),...DB.events.map(o=>({...o,_t:o.eventType,deliveryDate:o.eventDate}))].filter(o=>o.deliveryDate).sort((a,b)=>new Date(a.deliveryDate)-new Date(b.deliveryDate));
  return `
  <div class="shdr"><div><div class="stitle">Delivery Tracker</div></div></div>
  <div class="tw"><table>
    <thead><tr><th style="width:90px">Date</th><th style="width:130px">Customer</th><th style="width:80px">Type</th><th style="width:80px">Status</th><th style="width:60px">Balance</th><th>Notes</th></tr></thead>
    <tbody>${all.length?all.map(o=>{
      const d=new Date(o.deliveryDate);d.setHours(0,0,0,0);
      const diff=Math.ceil((d-n)/86400000);
      let cls='bdg-grn',lbl='In '+diff+'d';
      if(diff<0){cls='bdg-red';lbl='Overdue '+Math.abs(diff)+'d';}
      else if(diff===0){cls='bdg-amb';lbl='Today';}
      else if(diff<=2){cls='bdg-amb';lbl='In '+diff+'d';}
      return`<tr>
        <td><b>${o.deliveryDate}</b></td>
        <td>${o.name}<div class="phone">${o.phone||''}</div></td>
        <td><span class="bdg ${o._t==='Walk-in'?'bdg-muted':'bdg-g'}">${o._t}</span></td>
        <td><span class="bdg ${cls}">${lbl}</span></td>
        <td class="${parseFloat(o.balance)>0?'bal-r':'bal-g'}">${fmtINR(o.balance)}</td>
        <td style="font-size:11px;color:var(--txm)">${o.notes||'—'}</td>
      </tr>`;
    }).join(''):'<tr><td colspan="6" class="empty">No deliveries tracked yet</td></tr>'}</tbody>
  </table></div>`;
}

/* ─── REPORTS ─── */
function renderReports(){
  const allOrd=[...DB.walkins,...DB.events];
  const totalSales=allOrd.reduce((a,o)=>a+(parseFloat(o.amount)||0),0);
  const totalAdv=allOrd.reduce((a,o)=>a+(parseFloat(o.advance)||0),0);
  const totalBal=allOrd.reduce((a,o)=>a+(parseFloat(o.balance)||0),0);
  const delivered=allOrd.filter(o=>o.status==='Delivered').length;
  const svcCount={};
  DB.walkins.forEach(o=>{svcCount[o.service]=(svcCount[o.service]||0)+1;});
  const topSvc=Object.entries(svcCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const evCount={};
  DB.events.forEach(o=>{evCount[o.eventType]=(evCount[o.eventType]||0)+1;});
  const topEv=Object.entries(evCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const totalVendorCost=DB.pricing.reduce((a,p)=>a+(parseFloat(p.cost)||0),0);
  const bestFrame=DB.pricing.filter(p=>p.sell>0&&p.cost>0).sort((a,b)=>((b.sell-b.cost)/b.cost)-((a.sell-a.cost)/a.cost))[0];
  return `

      <div class="rep-row"><span class="rep-lbl">Balance Pending</span><span class="rep-val bal-r">${fmtINR(totalBal)}</span></div>
      <div class="rep-row"><span class="rep-lbl">Orders Delivered</span><span class="rep-val bal-g">${delivered}</span></div>

/* ─── ADD MODAL FORMS ─── */
function showAdd(type){
  const shade=document.createElement('div');
  shade.className='shade';
  shade.id='shade';
  shade.style='position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;overflow-y:auto;padding:20px';
  shade.innerHTML=`<div class="modal">${buildForm(type)}</div>`;
  document.body.appendChild(shade);
  if(type==='walkin'||type==='quicklog') setupWiCalc();
  if(type==='event') setupEvCalc();
  if(type==='price') setupPriceCalc();
}
function closeShade(){const s=document.getElementById('shade');if(s)s.remove();}

/* ─── FORM HELPERS ─── */
function calcBal(t){
  const a=parseFloat(document.getElementById('f-amt').value)||0;
  const d=parseFloat(document.getElementById('f-adv').value)||0;
  document.getElementById('f-bal').value=Math.max(0,a-d);
}
function setupWiCalc(){setTimeout(()=>{const i=document.getElementById('f-amt');if(i){i.addEventListener('input',()=>calcBal('wi'));}},100);}
function setupEvCalc(){setTimeout(()=>{const i=document.getElementById('f-amt');if(i){i.addEventListener('input',()=>calcBal('ev'));}},100);}
function setupPriceCalc(){}
function calcSell(){
  const c=parseFloat(document.getElementById('f-pcost').value)||0;
  document.getElementById('f-pmin').value=Math.round(c*2);
  calcMargin();
}
function calcMargin(){
  const c=parseFloat(document.getElementById('f-pcost').value)||0;
  const s=parseFloat(document.getElementById('f-psell').value)||0;
  document.getElementById('f-pmarg').value=c>0?Math.round(((s-c)/c)*100):0;
}
function qlBal(){
  const a=parseFloat(document.getElementById('ql-amt').value)||0;
  const d=parseFloat(document.getElementById('ql-adv').value)||0;
  document.getElementById('ql-bal').value=Math.max(0,a-d);
}

/* ─── SAVE ACTIONS ─── */
function saveWi(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('Customer name required');return;}
  const amt=parseFloat(document.getElementById('f-amt').value)||0;
  const adv=parseFloat(document.getElementById('f-adv').value)||0;
  DB.walkins.push({date:document.getElementById('f-date').value,name,phone:document.getElementById('f-phone').value,service:document.getElementById('f-svc').value,status:document.getElementById('f-status').value,amount:amt,advance:adv,balance:Math.max(0,amt-adv),payMode:document.getElementById('f-pay').value,urgent:document.getElementById('f-urg').value==='Yes',deliveryDate:document.getElementById('f-del').value,notes:document.getElementById('f-notes').value});
  save();closeShade();render();
}
function saveEv(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('Customer name required');return;}
  const amt=parseFloat(document.getElementById('f-amt').value)||0;
  const adv=parseFloat(document.getElementById('f-adv').value)||0;
  const crew={pt:+document.getElementById('f-pt').value,pc:+document.getElementById('f-pc').value,vt:+document.getElementById('f-vt').value,vc:+document.getElementById('f-vc').value,ph:+document.getElementById('f-ph').value,vh:+document.getElementById('f-vh').value,vv:+document.getElementById('f-vv').value,v3:+document.getElementById('f-v3').value,dr:+document.getElementById('f-dr').value,ac:+document.getElementById('f-ac').value};
  DB.events.push({date:document.getElementById('f-date').value,name,phone:document.getElementById('f-phone').value,eventType:document.getElementById('f-etype').value,eventDate:document.getElementById('f-edate').value,venue:document.getElementById('f-venue').value,...crew,amount:amt,advance:adv,balance:Math.max(0,amt-adv),status:document.getElementById('f-status').value,terms:document.getElementById('f-terms').value,notes:document.getElementById('f-notes').value});
  save();closeShade();render();
}
function saveTask(){
  const name=document.getElementById('f-tname').value.trim();
  if(!name){alert('Task name required');return;}
  DB.tasks.push({name,customer:document.getElementById('f-cust').value,priority:document.getElementById('f-pri').value,deadline:document.getElementById('f-dl').value,dueTime:document.getElementById('f-tm').value,assigned:document.getElementById('f-asgn').value,status:document.getElementById('f-stat').value,notes:document.getElementById('f-tnotes').value});
  save();closeShade();render();
}
function savePrice(){
  const size=document.getElementById('f-psize').value.trim();
  if(!size){alert('Size required');return;}
  DB.pricing.push({size,cost:parseFloat(document.getElementById('f-pcost').value)||0,sell:parseFloat(document.getElementById('f-psell').value)||0,note:document.getElementById('f-pnote').value});
  save();closeShade();render();
}
function saveCust(){
  const name=document.getElementById('f-cname').value.trim();
  if(!name){alert('Name required');return;}
  DB.customers.push({name,phone:document.getElementById('f-cmob').value,whatsapp:document.getElementById('f-cwa').value,address:document.getElementById('f-cadr').value,reviewDone:document.getElementById('f-crev').value==='1'});
  save();closeShade();render();
}
function saveQL(){
  const name=document.getElementById('ql-name').value.trim();
  if(!name){alert('Customer name required');return;}
  const amt=parseFloat(document.getElementById('ql-amt').value)||0;
  const adv=parseFloat(document.getElementById('ql-adv').value)||0;
  DB.walkins.push({date:document.getElementById('ql-date').value,name,phone:document.getElementById('ql-phone').value,service:document.getElementById('ql-svc').value,status:'New Order',amount:amt,advance:adv,balance:Math.max(0,amt-adv),deliveryDate:document.getElementById('ql-del').value,notes:document.getElementById('ql-note').value});
  save();
  ['ql-name','ql-phone','ql-amt','ql-adv','ql-bal','ql-del','ql-note'].forEach(id=>{document.getElementById(id).value='';});
  render();
}
function editPrice(i){
  showAdd('price');
  setTimeout(()=>{
    const p=DB.pricing[i];
    document.getElementById('f-psize').value=p.size;
    document.getElementById('f-pcost').value=p.cost;
    document.getElementById('f-psell').value=p.sell;
    document.getElementById('f-pnote').value=p.note||'';
    calcSell();
    const btn=document.querySelector('.btn.btn-g');
    if(btn){btn.onclick=()=>{DB.pricing[i]={size:document.getElementById('f-psize').value,cost:parseFloat(document.getElementById('f-pcost').value)||0,sell:parseFloat(document.getElementById('f-psell').value)||0,note:document.getElementById('f-pnote').value};save();closeShade();render();};}
  },150);
}

/* ─── UTILS ─── */
function crewSum(o){
  const m=[['pt','P-T'],['pc','P-C'],['vt','V-T'],['vc','V-C'],['ph','P-H'],['vh','V-H'],['vv','VV'],['v3','360'],['dr','Drone'],['ac','Actn'],
           ['photoTrad','P-T'],['photoCine','P-C'],['videoTrad','V-T'],['videoCine','V-C'],['photoHybrid','P-H'],['videoHybrid','V-H'],['verticalVideo','VV'],['video360','360'],['drone','Drone'],['action','Actn']];
  const seen=new Set();const r=[];
  m.forEach(([k,l])=>{if(!seen.has(l)&&o[k]>0){seen.add(l);r.push(o[k]+l);}});
  return r.join(' · ')||'—';
}
function statusBadge(s){
  const map={Urgent:'bdg-urg',Delivered:'bdg-grn','New Order':'bdg-blu','In Progress':'bdg-amb',Ready:'bdg-grn','Payment Pending':'bdg-red',Cancelled:'bdg-red'};
  return`<span class="bdg ${map[s]||'bdg-muted'}">${s||'—'}</span>`;
}

/* ─── CSV EXPORT ─── */
function exportAll(){
  const rows=[['Type','Date','Customer','Phone','Service/Event','Event Date','Amount','Advance','Balance','Status','Delivery','Notes','Crew']];
  DB.walkins.forEach(o=>rows.push(['Walk-in',o.date,o.name,o.phone,o.service,'',o.amount,o.advance,o.balance,o.status,o.deliveryDate,o.notes,'']));
  DB.events.forEach(o=>rows.push(['Event',o.date,o.name,o.phone,o.eventType,o.eventDate,o.amount,o.advance,o.balance,o.status,o.eventDate,o.notes,crewSum(o)]));
  const csv=rows.map(r=>r.map(v=>'"'+(v||'').toString().replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='tathastu_'+today()+'.csv';a.click();
}

/* ── Startup ── */
(function init(){
  document.getElementById('hdr-date').textContent=
    new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});

  if(!workerAvailable()){
    // No worker configured — run in offline/localStorage-only mode
    document.getElementById('login-overlay').classList.add('hidden');
    loadFromCache();
    setSyncStatus('err');
    document.getElementById('sync-txt').textContent='Offline mode';
    return;
  }

  // Check if already logged in this session
  const creds=getCredentials();
  if(creds){
    document.getElementById('login-overlay').classList.add('hidden');
    loadFromWorker();
  }
  // else: login overlay stays visible
})();
</script>
